services:
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SERVER_API_HOST=${NEXT_PUBLIC_SERVER_API_HOST}
        - NEXT_HOME_URL=${NEXT_HOME_URL}
    env_file:
      - path: ./.env.local
        required: true
    stdin_open: true
    ports:
      - "3000:3000"
    develop:
      watch:
        - path: ./frontend
          target: /app
          action: sync

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    env_file:
      - path: ./.env.local
        required: true
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - path: ./backend
          target: /app
          action: sync
          ignore:
            - .venv/
            - __pycache__/
            - .ruff_cache/
    ports:
      - "8000:8000"

  db:
    image: postgres:17.2
    restart: always
    volumes:
      - NCU_TOM_Local:/var/lib/postgresql
    env_file:
      - path: ./.env.local
        required: true
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 30s

volumes:
  NCU_TOM_Local:
    name: NCU_TOM_Local
